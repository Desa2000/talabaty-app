version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: talabaty_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talabaty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: talabaty_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/talabaty?schema=public"
      JWT_ACCESS_SECRET: "super-secret-access-token-key-2026"
      JWT_REFRESH_SECRET: "super-secret-refresh-token-key-2026"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
      NODE_ENV: "development"
    depends_on:
      - db

volumes:
  pgdata:
